name: CI

on:
  push:
    branches: [main, stable-deploy]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Build the project
        run: npm run build

      - name: Run linter
        run: npm run lint
